version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mcq_db
      POSTGRES_USER: mcq_user
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./mcq_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./mcq_backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - POSTGRES_DB=mcq_db
      - POSTGRES_USER=mcq_user
      - POSTGRES_PASSWORD=password123
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432

  frontend:
    build:
      context: ./mcq_frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./mcq_frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
